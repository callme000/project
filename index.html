<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .task-column {
            min-height: 400px;
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
        }
        .task-card {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="#">TaskFlow Dashboard</a>
        </div>
    </nav>

    <div class="container my-4">
        <!-- Task Form Section -->
        <div class="row mb-5 justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Add New Task</h5>
                        <form id="taskForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="taskTitle" class="form-label">Title</label>
                                    <input type="text" class="form-control" id="taskTitle" required placeholder="What needs to be done?">
                                </div>
                                <div class="col-md-3">
                                    <label for="taskPriority" class="form-label">Priority</label>
                                    <select class="form-select" id="taskPriority">
                                        <option value="Low">Low</option>
                                        <option value="Medium" selected>Medium</option>
                                        <option value="High">High</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="taskDueDate" class="form-label">Due Date</label>
                                    <input type="date" class="form-control" id="taskDueDate">
                                </div>
                                <div class="col-12">
                                    <label for="taskDescription" class="form-label">Description</label>
                                    <textarea class="form-control" id="taskDescription" rows="2" placeholder="Brief details..."></textarea>
                                </div>
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-primary px-4">Add Task</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Task Board Columns -->
        <div class="row g-4">
            <!-- To Do Column -->
            <div class="col-lg-4">
                <div class="task-column">
                    <h5 class="border-bottom pb-2 mb-3 d-flex justify-content-between align-items-center">
                        To Do
                        <span class="badge bg-secondary rounded-pill" id="todoCount">0</span>
                    </h5>
                    <div id="todoList">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>
            </div>

            <!-- In Progress Column -->
            <div class="col-lg-4">
                <div class="task-column">
                    <h5 class="border-bottom pb-2 mb-3 d-flex justify-content-between align-items-center">
                        In Progress
                        <span class="badge bg-primary rounded-pill" id="inProgressCount">0</span>
                    </h5>
                    <div id="inProgressList">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>
            </div>

            <!-- Done Column -->
            <div class="col-lg-4">
                <div class="task-column">
                    <h5 class="border-bottom pb-2 mb-3 d-flex justify-content-between align-items-center">
                        Done
                        <span class="badge bg-success rounded-pill" id="doneCount">0</span>
                    </h5>
                    <div id="doneList">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
