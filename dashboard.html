<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Dashboard - Manage Your Tasks</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .task-column {
            min-height: 400px;
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
        }
        .task-card {
            margin-bottom: 15px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-check-double me-2 text-primary"></i>TaskFlow
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="team.html">Team</a></li>
                    <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <!-- Dashboard Header -->
        <div class="row mb-4 align-items-center">
            <div class="col">
                <h1 class="h2 fw-bold">Task Management Board</h1>
                <p class="text-muted">Organize, track, and complete your projects.</p>
            </div>
        </div>

        <!-- Task Form Section -->
        <div class="row mb-5 justify-content-center">
            <div class="col-md-10">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-4 fw-bold">Create New Task</h5>
                        <form id="taskForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="taskTitle" class="form-label fw-semibold">Task Title</label>
                                    <input type="text" class="form-control" id="taskTitle" required placeholder="e.g., Finalize project report">
                                </div>
                                <div class="col-md-3">
                                    <label for="taskPriority" class="form-label fw-semibold">Priority Level</label>
                                    <select class="form-select" id="taskPriority">
                                        <option value="Low">Low</option>
                                        <option value="Medium" selected>Medium</option>
                                        <option value="High">High</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label for="taskDueDate" class="form-label fw-semibold">Due Date</label>
                                    <input type="date" class="form-control" id="taskDueDate">
                                </div>
                                <div class="col-12">
                                    <label for="taskDescription" class="form-label fw-semibold">Task Description</label>
                                    <textarea class="form-control" id="taskDescription" rows="2" placeholder="Provide more details about this task..."></textarea>
                                </div>
                                <div class="col-12 text-end">
                                    <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">Add to Board</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Task Board Columns -->
        <div class="row g-4 mb-5">
            <!-- To Do Column -->
            <div class="col-lg-4">
                <div class="task-column border">
                    <h5 class="border-bottom pb-2 mb-3 d-flex justify-content-between align-items-center fw-bold">
                        <span class="text-secondary"><i class="far fa-circle me-2"></i>To Do</span>
                        <span class="badge bg-secondary rounded-pill" id="todoCount">0</span>
                    </h5>
                    <div id="todoList">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>
            </div>

            <!-- In Progress Column -->
            <div class="col-lg-4">
                <div class="task-column border">
                    <h5 class="border-bottom pb-2 mb-3 d-flex justify-content-between align-items-center fw-bold">
                        <span class="text-primary"><i class="fas fa-spinner fa-spin me-2"></i>In Progress</span>
                        <span class="badge bg-primary rounded-pill" id="inProgressCount">0</span>
                    </h5>
                    <div id="inProgressList">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>
            </div>

            <!-- Done Column -->
            <div class="col-lg-4">
                <div class="task-column border">
                    <h5 class="border-bottom pb-2 mb-3 d-flex justify-content-between align-items-center fw-bold">
                        <span class="text-success"><i class="fas fa-check-circle me-2"></i>Done</span>
                        <span class="badge bg-success rounded-pill" id="doneCount">0</span>
                    </h5>
                    <div id="doneList">
                        <!-- Tasks will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-2">&copy; 2026 TaskFlow Suite. All rights reserved.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="#" class="text-white-50"><i class="fab fa-github"></i></a>
                <a href="#" class="text-white-50"><i class="fab fa-twitter"></i></a>
                <a href="#" class="text-white-50"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
